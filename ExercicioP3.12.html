<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
        Percorrendo Arrays com for...of:
        Crie um array de frutas e use for...of para mostrar cada fruta no console.        
        */

        frutas = ["banana", "maçã", "melancia", "laranja", "tomate(!)"]

        for (fruta of frutas)
        {
            console.log(fruta)
        }
    </script>      
</body>
</html>
