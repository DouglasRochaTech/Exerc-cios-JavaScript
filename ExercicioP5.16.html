<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

</head>
<body>
    Dobrar Valores (map):
    Dado o array [1, 2, 3, 4, 5], use map para criar um novo array com cada número
    dobrado.

    <script>
        numeros = [1, 2, 3, 4, 5]
        
        numerosDobrados = numeros.map(function(numero) {
        return numero * 2;
        })

        console.log(numerosDobrados)
        //vai mostrar [2, 4, 6, 8, 10]!!!
    </script>
</body>
</html>
