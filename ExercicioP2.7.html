<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Receba uma nota de 0 a 10.
    o >= 7: "Aprovado".
    o >= 5 e < 7: "Recuperação".
    o < 5: "Reprovado".

    <script>
        let nota = parseFloat(prompt("Informe a nota: "))

        if      (nota >= 7)             { alert("Você está aprovado!")}
        else if (nota >= 5 && nota < 7) { alert("Você está de recuperação!")}
        else                            { alert("Você foi reprovado!")}
    </script>      
</body>
</html>
