<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Diferença de Escopo:
    Declare uma variável let numero = 10 fora de um bloco {}. Dentro do bloco,
    declare novamente let numero = 20. Mostre o valor da variável dentro e fora do
    bloco com console.log.

    <script>
        let numero = 10
        {
            let numero = 20

            console.log(numero) //mostra 20
        }

        console.log(numero) //mostra 10
    </script>
</body>
</html>
