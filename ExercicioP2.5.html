<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
        Peça ao usuário (com prompt) sua idade.
        o Se for menor que 12, mostre "Criança".
        o Se estiver entre 12 e 17, mostre "Adolescente".
        o Se for maior ou igual a 18, mostre "Adulto"
        */


        idade = parseInt(prompt("Informe a sua idade: "))

        if (idade < 12)
        {
            alert("Você é criança!")
        }
        else if (idade <= 17)
        {
            alert("Você é adolescente!")
        }
        else
        {
            alert("Você é adulto!")
        }
    </script>
</body>
</html>
