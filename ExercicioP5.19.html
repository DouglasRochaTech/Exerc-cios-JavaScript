<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
        Encadeando Métodos:
        Dado o array [2, 5, 8, 11, 14], use filter para selecionar apenas os números
        maiores que 5 e depois map para multiplicá-los por 2. Mostre o resultado final.        
        */

        numeros = [2, 5, 8, 11, 14]

        numerosAvacalhados = numeros.filter(function(numero) {
        return numero %2 == 0;
        });

        numerosAvacalhados = numerosAvacalhados.map(function (numero) {
        return numero * 2
        })

        console.log(numerosAvacalhados)
    </script>
</body>
</html>
