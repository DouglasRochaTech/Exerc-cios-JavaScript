<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Declaração com let:
    Crie uma variável let idade e atribua sua idade. Depois, atribua um novo valor
    representando a idade daqui a 5 anos. Mostre os dois valores no console: “Minha
    idade hoje é <idade> e daqui a 5 anos será <nova_idade>”

    <script>
        let idade = parseInt(prompt("Informe a sua idade: "))

        let idadeVelho = idade + 5

        alert(`Minha idade hoje é ${idade} e daqui a 5 anos será ${idadeVelho}`)
    </script>
</body>
</html>
