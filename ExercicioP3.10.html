<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body> 
    <script>
        /*
        Contagem Regressiva com while:
        Mostre no console a contagem regressiva de 10 até 1 com while        
        */

        let numero = 10

        while (numero >= 1)
        {
            console.log(numero)
            numero -= 1
        }
    </script>      
</body>
</html>
