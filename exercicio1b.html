<body>
    Elabore um programa que leia um número; informe se ele é ímpar ou par; faça com o if...else... 
    Tradicional e após, tente criar com o operador ternário.

    <script>
        let numero1 = Number(prompt('Digite um número inteiro: '))

        let parOuImpar = (numero1%2 === 0) ? "par" : "ímpar"

        alert(f`O número é ${parOuImpar}`)


    </script>
