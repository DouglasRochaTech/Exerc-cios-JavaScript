<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>    
    <script>
        /*
        Manipulação de Propriedades:
        Crie um objeto livro com título e autor.
        o Adicione dinamicamente a propriedade ano.
        o Altere o título.
        o Exclua a propriedade autor.
        o Mostre o objeto atualizado no console.        
        */

        livro = 
        {
            titulo: "The Universe in a Nutshell", autor: "Stephen Hawking"
        }

        livro.ano = 2001
        livro.titulo = "asdfghjkl"
        delete livro.autor

        console.log(livro)
    </script>      
</body>
</html>
